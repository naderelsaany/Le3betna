name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          
      - name: Install dependencies
        working-directory: ./le3betna_app
        run: flutter pub get
        
      - name: Build Web App
        working-directory: ./le3betna_app
        run: flutter build web --web-renderer auto --release --no-tree-shake-icons -v
        
      - name: Deploy to Firebase
        working-directory: ./le3betna_app
        run: |
          set +e
          OUTPUT=$(npx firebase-tools deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }} 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "is the current active version"; then
              echo "Deployment succeeded, ignoring Firebase duplicate active version error."
              exit 0
            else
              exit $EXIT_CODE
            fi
          fi
